name: Validate 

on:
  pull_request:
    branches: [ main ]

jobs:
  start-status:
    name: Start Status
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set commit status to pending
        uses: ./.github/actions/start-status
        with:
          name: "Validate Checks"
          ref: ${{ github.sha }}

  end-status:
    name: End Status
    if: always() 
    runs-on: ubuntu-latest
    needs: [discover-modules, test-modules, test-scenarios, validate-structure, test-charts, test-merge, test-dns-resources]
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/accessing-contextual-information-about-workflow-runs#steps-context
        # it would be preferable to check the inverse of the if below by comparing solely to 'success' but there's no way to do that with a wildcard and the current
        # set of GitHub workflow functions
      - if: >-
          ${{
            contains(needs.*.result, 'failure') ||
            contains(needs.*.result, 'cancelled') ||
            contains(needs.*.result, 'skipped')
          }}
        run: exit 1 # will make status show as failure

      - name: Set commit status to success or failure
        if: always()
        uses: ./.github/actions/end-status
        with:
          name: "Validate Checks"
          ref: ${{ github.sha }}

  discover-modules:
    name: Discover Modules
    runs-on: ubuntu-latest
    needs: start-status
    outputs:
      modules: ${{ steps.find-modules.outputs.modules }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find modules with test scripts
        id: find-modules
        run: |
          MODULES=$(find modules -name "test.sh" -type f | sed 's|modules/||; s|/test/test.sh||' | jq -R -s -c 'split("\n")[:-1]')
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Found modules: $MODULES"

  test-modules:
    name: Test ${{ matrix.module }} Module
    runs-on: ubuntu-latest
    needs: [discover-modules, start-status]
    strategy:
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install common dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl wget gawk

      - name: Set up Go (for jplot module)
        if: matrix.module == 'jplot'
        uses: actions/setup-go@v4
        with:
            go-version: '1.23'

      - name: Install kubectl (for kind module)
        if: matrix.module == 'kind'
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Run module tests
        run: |
          chmod +x modules/${{ matrix.module }}/test/test.sh
          ./modules/${{ matrix.module }}/test/test.sh

  test-scenarios:
    name: Test ${{ matrix.traffic }}/${{ matrix.scenario }} (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: [test-modules, start-status]
    strategy:
      matrix:
        traffic: [ingress, gateway]
        scenario: [basic-rps, restarting-backend-rps]
        variant: [default]
        include:
          - traffic: ingress
            scenario: basic-rps
            variant: scheduling-e2e
            kind_topology: scheduling-e2e
            node_selector: scheduling=enabled
            tolerations_file: ./charts/server/ci-scheduling-values.yaml
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

          # Install Helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Test scenario script syntax
        run: |
          bash -n scripts/scenarios/basic_rps.sh
          echo "✓ basic_rps.sh syntax check passed"
          bash -n scripts/scenarios/restarting_backend_rps.sh
          echo "✓ restarting_backend_rps.sh syntax check passed"

      - name: Run ${{ matrix.traffic }}/${{ matrix.scenario }} scenario
        run: |
          OUTPUT_FILE="./results/${{ matrix.traffic }}_${{ matrix.scenario }}_${{ matrix.variant }}.json"
          KIND_TOPOLOGY="${{ matrix.kind_topology || '' }}"
          NODE_SELECTOR="${{ matrix.node_selector || '' }}"
          TOLERATIONS_FILE="${{ matrix.tolerations_file || '' }}"

          MASTER_ARGS=(
            --traffic "${{ matrix.traffic }}"
            --scenario "${{ matrix.scenario }}"
            --rate 50
            --duration 30s
            --output-file "$OUTPUT_FILE"
          )

          if [ -n "$KIND_TOPOLOGY" ]; then
            MASTER_ARGS+=(--kind-topology "$KIND_TOPOLOGY")
          fi

          if [ -n "$NODE_SELECTOR" ]; then
            MASTER_ARGS+=(--node-selector "$NODE_SELECTOR")
          fi

          if [ -n "$TOLERATIONS_FILE" ]; then
            MASTER_ARGS+=(--tolerations-file "$TOLERATIONS_FILE")
          fi

          chmod +x ./scripts/master.sh
          ./scripts/master.sh "${MASTER_ARGS[@]}"

          echo "Checking for 200 responses"
          TOTAL_200_COUNT=$(jq -r '.code.hist["200"] // 0' "$OUTPUT_FILE" | awk '{s+=$1} END {print s+0}')
          if [[ "${TOTAL_200_COUNT}" =~ ^[0-9]+$ ]] && [[ "${TOTAL_200_COUNT}" -gt 0 ]]; then
            echo "✓ Found ${TOTAL_200_COUNT} total successful HTTP 200 responses across all intervals"
          else
            echo "ERROR: No HTTP 200 responses found in any interval"
            echo "Output file contents:"
            cat "$OUTPUT_FILE"
            exit 1
          fi

          echo "✓ ${{ matrix.traffic }}/${{ matrix.scenario }} scenario executed successfully"

  test-merge:
    name: Test Multi-Pod Merge
    runs-on: ubuntu-latest
    needs: [test-modules, start-status]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl wget gawk

      - name: Install vegeta and jaggr
        run: |
          chmod +x modules/vegeta/install/install.sh
          modules/vegeta/install/install.sh

      - name: Start test server
        run: |
          docker run -d \
            --name merge-test-server \
            -p 9998:9998 \
            -e PORT=9998 \
            ghcr.io/azure/aks-traffic-ingress-competitive-testing:8aba95806ff611e9939257e2c3c9f53b3af5f7a2

          SERVER_READY=false
          for i in {1..10}; do
            if curl -s http://localhost:9998 > /dev/null; then
              echo "Test server ready"
              SERVER_READY=true
              break
            fi
            echo "Waiting for server... (attempt $i/10)"
            sleep 2
          done

          if [ "$SERVER_READY" != "true" ]; then
            echo "ERROR: Test server failed to start after 10 attempts"
            docker logs merge-test-server 2>&1 || true
            exit 1
          fi

      - name: Run 4 simultaneous vegeta attacks
        run: |
          mkdir -p results/merge-test

          # Simulate 4 pods each attacking at 50 RPS for 15s (total: 200 RPS)
          for pod in 0 1 2 3; do
            echo "GET http://localhost:9998" | \
              vegeta attack -rate=50 -duration=15s -workers=2 \
              > "results/merge-test/pod${pod}.bin" &
          done

          echo "Waiting for all 4 attacks to complete..."
          wait
          echo "All attacks finished"

          # Verify all .bin files are non-empty
          for pod in 0 1 2 3; do
            if [[ ! -s "results/merge-test/pod${pod}.bin" ]]; then
              echo "ERROR: pod${pod}.bin is empty"
              exit 1
            fi
            echo "pod${pod}.bin: $(wc -c < results/merge-test/pod${pod}.bin) bytes"
          done

      - name: Merge results and validate
        run: |
          chmod +x modules/vegeta/merge/merge.sh

          modules/vegeta/merge/merge.sh \
            --output-file results/merge-test/merged.json \
            results/merge-test/pod0.bin \
            results/merge-test/pod1.bin \
            results/merge-test/pod2.bin \
            results/merge-test/pod3.bin

          echo "=== Merged output ==="
          cat results/merge-test/merged.json
          echo ""

          # Verify the merged file is non-empty
          if [[ ! -s results/merge-test/merged.json ]]; then
            echo "ERROR: Merged output is empty"
            exit 1
          fi

          # Verify per-second bucketing: 15s test should produce at least 12 lines
          # (first and last second-buckets may be partial)
          LINE_COUNT=$(wc -l < results/merge-test/merged.json)
          echo "Merged output has ${LINE_COUNT} lines for a 15s test"
          if [[ "${LINE_COUNT}" -lt 12 ]]; then
            echo "ERROR: Expected at least 12 second-buckets for a 15s test, got ${LINE_COUNT}"
            exit 1
          fi

          # Verify combined RPS is roughly 200 (4 pods x 50 RPS)
          AVG_RPS=$(jq -r '.rps' results/merge-test/merged.json | awk '{s+=$1; n++} END {print int(s/n)}')
          echo "Average merged RPS: ${AVG_RPS} (expected ~200)"
          if [[ "${AVG_RPS}" -lt 120 ]]; then
            echo "ERROR: Average RPS ${AVG_RPS} is too low (expected ~200 from 4x50 RPS)"
            exit 1
          fi

          # Verify code histogram sums match reported rps for each line
          while IFS= read -r line; do
            RPS_VAL=$(echo "$line" | jq -r '.rps')
            CODE_SUM=$(echo "$line" | jq -r '[.code.hist | to_entries[] | .value] | add // 0')
            if [[ "${CODE_SUM}" -ne "${RPS_VAL}" ]]; then
              echo "ERROR: Code histogram sum (${CODE_SUM}) does not match rps (${RPS_VAL})"
              echo "Line: ${line}"
              exit 1
            fi
          done < results/merge-test/merged.json

          # Verify all lines have the expected JSON structure
          while IFS= read -r line; do
            for field in rps code.hist latency.p25 latency.p50 latency.p99 bytes_in.sum bytes_out.sum; do
              if ! echo "$line" | jq -e ".${field}" > /dev/null 2>&1; then
                echo "ERROR: Merged output line missing field '${field}'"
                echo "Line: ${line}"
                exit 1
              fi
            done
          done < results/merge-test/merged.json

          echo "✓ Multi-pod merge validation passed"

      - name: Cleanup
        if: always()
        run: |
          docker stop merge-test-server > /dev/null 2>&1 || true
          docker rm merge-test-server > /dev/null 2>&1 || true

  test-dns-resources:
    name: Test DNS ${{ matrix.resource }} scripts
    runs-on: ubuntu-latest
    needs: [test-modules, start-status]
    strategy:
      matrix:
        include:
          - resource: ingresses
            traffic: ingress
            setup_script: ./scripts/setup/ingress.sh
            install_script: ./scripts/install/nginx.sh
            kind: Ingress
          - resource: httproutes
            traffic: gateway
            setup_script: ./scripts/setup/gateway.sh
            install_script: ./scripts/install/istio.sh
            kind: HTTPRoute
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Syntax check DNS scripts
        run: |
          bash -n scripts/setup/dns-ingresses.sh
          bash -n scripts/cleanup/dns-ingresses.sh
          bash -n scripts/setup/dns-httproutes.sh
          bash -n scripts/cleanup/dns-httproutes.sh

      - name: Setup Kind cluster
        run: |
          chmod +x ./modules/kind/install/install.sh ./modules/kind/run/run.sh
          ./modules/kind/install/install.sh
          ./modules/kind/run/run.sh

      - name: Install ${{ matrix.traffic }} controller
        run: |
          chmod +x ${{ matrix.install_script }}
          ${{ matrix.install_script }}

      - name: Deploy server chart
        run: |
          chmod +x ${{ matrix.setup_script }}
          ${{ matrix.setup_script }}

      - name: Run setup/dns-${{ matrix.resource }} (count=5)
        run: |
          chmod +x scripts/setup/dns-${{ matrix.resource }}.sh
          scripts/setup/dns-${{ matrix.resource }}.sh --namespace server --count 5 --domain extdns.telescope.test

      - name: Assert 5 ${{ matrix.kind }} resources exist with dns-test=true
        run: |
          if [ "${{ matrix.resource }}" = "ingresses" ]; then
            COUNT=$(kubectl get ingress -n server -l dns-test=true -o name | wc -l)
          else
            COUNT=$(kubectl get httproute.gateway.networking.k8s.io -n server -l dns-test=true -o name | wc -l)
          fi
          echo "Found ${COUNT} ${{ matrix.kind }} resources with dns-test=true"
          if [ "${COUNT}" -ne 5 ]; then
            echo "ERROR: Expected 5, got ${COUNT}"
            exit 1
          fi

      - name: Run cleanup/dns-${{ matrix.resource }}
        run: |
          chmod +x scripts/cleanup/dns-${{ matrix.resource }}.sh
          scripts/cleanup/dns-${{ matrix.resource }}.sh --namespace server

      - name: Assert all dns-test resources are gone
        run: |
          # --wait=false means deletes are async; poll briefly
          for i in {1..15}; do
            if [ "${{ matrix.resource }}" = "ingresses" ]; then
              COUNT=$(kubectl get ingress -n server -l dns-test=true -o name 2>/dev/null | wc -l)
            else
              COUNT=$(kubectl get httproute.gateway.networking.k8s.io -n server -l dns-test=true -o name 2>/dev/null | wc -l)
            fi
            [ "${COUNT}" -eq 0 ] && break
            echo "Still ${COUNT} resources present, waiting... (attempt $i/15)"
            sleep 2
          done
          if [ "${COUNT}" -ne 0 ]; then
            echo "ERROR: Expected 0, got ${COUNT}"
            exit 1
          fi
          echo "✓ All dns-test ${{ matrix.kind }} resources removed"

      - name: Negative path - missing service
        run: |
          if scripts/setup/dns-${{ matrix.resource }}.sh --namespace server --count 1 --domain extdns.telescope.test --service-name nonexistent 2>/dev/null; then
            echo "ERROR: Expected non-zero exit for missing service"
            exit 1
          fi
          echo "✓ Correctly failed on missing service"

      - name: Negative path - invalid domain
        run: |
          if scripts/setup/dns-${{ matrix.resource }}.sh --namespace server --count 1 --domain "Bad_Domain!" 2>/dev/null; then
            echo "ERROR: Expected non-zero exit for invalid domain"
            exit 1
          fi
          echo "✓ Correctly failed on invalid domain"

      - name: Negative path - count=0
        run: |
          if scripts/setup/dns-${{ matrix.resource }}.sh --namespace server --count 0 --domain extdns.telescope.test 2>/dev/null; then
            echo "ERROR: Expected non-zero exit for count=0"
            exit 1
          fi
          echo "✓ Correctly failed on count=0"

  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    needs: start-status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate module structure
        run: |
          echo "Validating project structure..."
          
          # Find all directories in modules/
          echo "Discovering modules in modules/ directory..."
          
          # Check that all modules have required directories and files
          for module in $(find modules -maxdepth 1 -type d -not -name modules | sed 's|modules/||'); do
            echo "Checking module: $module"
            
            # Check install script exists
            if [[ ! -f "modules/$module/install/install.sh" ]]; then
              echo "ERROR: modules/$module/install/install.sh not found"
              exit 1
            fi
            
            # Check run script exists
            if [[ ! -f "modules/$module/run/run.sh" ]]; then
              echo "ERROR: modules/$module/run/run.sh not found"
              exit 1
            fi
            
            # Check test script exists
            if [[ ! -f "modules/$module/test/test.sh" ]]; then
              echo "ERROR: modules/$module/test/test.sh not found"
              exit 1
            fi
            
            # Check scripts are executable or can be made executable
            chmod +x "modules/$module/install/install.sh"
            chmod +x "modules/$module/run/run.sh"
            chmod +x "modules/$module/test/test.sh"
            
            echo "✓ Module $module structure validated"
          done
          
  test-charts:
    name: Validate Charts
    runs-on: ubuntu-latest
    needs: start-status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Install Helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Verify scheduling renders
        run: |
          FIXTURE="./charts/server/ci-scheduling-values.yaml"

          # Default render is already validated by test-scenarios running without scheduling flags.
          # Here we only verify that scheduling values appear when explicitly provided.

          assert_scheduling_render() {
            local traffic_mode="$1"
            local class_name="$2"
            local rendered

            if [ "$traffic_mode" = "ingress" ]; then
              rendered=$(helm template server ./charts/server \
                --set ingress.enabled=true \
                --set ingress.className="$class_name" \
                --set-json 'nodeSelector={"scheduling":"enabled"}' \
                --values "$FIXTURE")
            else
              rendered=$(helm template server ./charts/server \
                --set gateway.enabled=true \
                --set gateway.className="$class_name" \
                --set-json 'nodeSelector={"scheduling":"enabled"}' \
                --values "$FIXTURE")
            fi

            printf '%s\n' "$rendered" | grep -q 'nodeSelector:' || {
              echo "ERROR: ${traffic_mode} render missing nodeSelector"
              exit 1
            }

            printf '%s\n' "$rendered" | grep -q 'scheduling: enabled' || {
              echo "ERROR: ${traffic_mode} render missing scheduling nodeSelector value"
              exit 1
            }

            printf '%s\n' "$rendered" | grep -q 'tolerations:' || {
              echo "ERROR: ${traffic_mode} render missing tolerations"
              exit 1
            }

            printf '%s\n' "$rendered" | grep -q 'key: scheduling' || {
              echo "ERROR: ${traffic_mode} render missing toleration key"
              exit 1
            }

            printf '%s\n' "$rendered" | grep -q 'value: enabled' || {
              echo "ERROR: ${traffic_mode} render missing toleration value"
              exit 1
            }
          }

          assert_scheduling_render ingress nginx
          assert_scheduling_render gateway istio

      - name: Setup Kind cluster
        run: |
          echo "Installing Kind"
          chmod +x ./modules/kind/install/install.sh
          ./modules/kind/install/install.sh

          echo "Creating Kind cluster"
          chmod +x ./modules/kind/run/run.sh
          ./modules/kind/run/run.sh

          echo "Installing ingress-nginx"
          chmod +x ./scripts/install/nginx.sh
          ./scripts/install/nginx.sh

      - name: Validate charts
        run: |
          echo "Validating charts"
          
          # Find all directories in modules/
          echo "Discovering charts in charts/ directory..."

          # Check that all charts have required directories and files
          for chart in $(find charts -maxdepth 1 -type d -not -name charts | sed 's|charts/||'); do
            echo "Checking chart: $chart"

            helm upgrade --install server ./charts/$chart \
            --namespace $chart \
            --create-namespace \
            --wait

            helm test $chart --namespace $chart || {
              echo "ERROR: Helm test failed for chart $chart"
              exit 1
            }


            echo "✓ Chart $chart validated"
          done
